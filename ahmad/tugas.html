<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Kelompok</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .card{
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.05);
        }

        .profile-img{
            height:200px;
            object-fit:cover;
        }
    </style>
</head>
<body>

<div class="container mt-5">

        WEBSITE CV KELOMPOK
    </h1>

    <div class="row">

        <div class="col-md-4 mb-4">
            <div class="card shadow">

                <img src="assets/ahmad.jpg.jpeg"
                     class="card-img-top profile-img">

                <div class="card-body text-center">

                    <h5>Ahmad Pratama</h5>

                    <a href="ahmad.html"
                       class="btn btn-primary">
                        Lihat CV
                    </a>

                </div>
            </div>
        </div>

        <!-- Aldi -->
        <div class="col-md-4 mb-4">
            <div class="card shadow">

                <img src="aldi.jpg"
                     class="card-img-top profile-img">

                    <h5>aldi</h5>

                    <a href="aldi.html"
                       class="btn btn-primary">
                        Lihat CV
                    </a>

            </div>
        </div>

        <!-- Citra -->

                <img src="dimas.jpg"
                     class="card-img-top profile-img">

                <div class="card-body text-center">

                    <h5>Dimas Putra</h5>

                    <a href="dimas.html"
                       class="btn btn-primary">
                        Lihat CV
                    </a>

                </div>
            </div>
        </div>

        <!-- Eka -->

                <div class="card-body text-center">

</div>

</html>
